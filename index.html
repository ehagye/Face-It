<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Face-IT Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- top bar -->
  <header class="top-bar">
    <div class="logo">Face-IT</div>
    
    <div class="top-icons">
      <img src="icons/grid_icon.png" alt="Menu" class="icon-img"/>
      <img src="icons/gear_icon.png" alt="Settings" class="icon-img"/>
      <img src="icons/user_icon.png" alt="Profile" class="icon-img"/>
    </div>
  </header>

  <!-- main Dashboard -->
  <main class="dashboard">

    <!-- left Panel -->
    <section class="panel left-panel">
      <h2>Overview</h2>

      <div class="pie-container">
        <div class="pie-chart"></div>
        <div class="legend">
          <span class="present">■ Present</span>
          <span class="absent">■ Absent</span>
        </div>
      </div>
    </section>

    <!-- right Panel -->
    <section class="panel right-panel">

      <div class="alert-box">
        <div class="alert-number">12</div>
        <p>Students missing<br>5 or more consecutive lectures</p>
      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    Spring 2026
  </footer>

</body>
</html>
