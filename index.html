<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face-IT Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-bg">

<header class="top-bar">
    <h1>Face-IT</h1>
   <nav class="nav-actions">
    <button onclick="goToDashboard()">Dashboard</button>
    <button onclick="goToManageClasses()">Manage Classes</button>
    <button onclick="goToAlerts()">Alerts</button>
    <button onclick="goToSettings()">Settings</button>
    <button onclick="logout()">Log Out</button>
</nav>
</header>

<main class="dashboard">

    <!-- PROFESSOR -->
    <section class="glass-card professor-card">
        <div>
            <h2>
                Dr. William G. Johnson
                <button class="inline-alerts" onclick="goToAlerts()">View Alerts</button>
            </h2>
            <p>Capstone ICTW · Section 004</p>
        </div>
    </section>

    <section class="dashboard-grid">

        <!-- LEFT COLUMN -->
        <div class="column">
            <div class="glass-card">

                <div class="card-header">
                    <h3>Class Selection</h3>
                    <button class="manage-btn" onclick="goToManageClasses()">
                        Manage Classes
                    </button>
                </div>

                <select>
                    <option>Data Science 101</option>
                    <option>Capstone ICTW 004</option>
                </select>

            </div>
            
            <div class="glass-card">
                <h3>Class Roster</h3>
                <div class="roster">
                    <!-- filled by loadRoster() in script.js -->
                </div>
            </div>
            
            <div class="glass-card">
                <h3>Activity Log</h3>
                <div class="log">
                    <!-- filled by loadActivityLog() in script.js -->
                </div>
            </div>
        </div>  

        <!-- RIGHT COLUMN -->
        <div class="column">
            <div class="glass-card">
                <h3>Attendance Overview</h3>
                <canvas id="attendanceChart"></canvas>
            </div>

            <div class="glass-card status">
                <h3>Camera Status</h3>
                <p class="active">● Active</p>
            </div>
        </div>

    </section>
</main>

<script src="chart.js"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
loadRoster();
loadActivityLog();
 
new Chart(document.getElementById("attendanceChart"), {
    type: "doughnut",
    data: {
        labels: ["Present", "Absent"],
        datasets: [{
            data: [26, 3],
            backgroundColor: ["#4fc3ff", "#ff6b6b"]
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        }
    }
});
</script>
</body>
</html>
